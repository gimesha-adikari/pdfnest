<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Primary Brand Linear Gradient (Matching Screenshot Baseline) -->
    <linearGradient id="brandLinearGradient" x1="15%" y1="15%" x2="85%" y2="85%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="60%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <!-- Deep Specular Shadow for Inner Wing Overlap Layers -->
    <linearGradient id="innerShadowGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0" />
    </linearGradient>

    <!-- Ambient Glow Shadow Filtering Core Matrix -->
    <filter id="ambientBrandingGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. Custom Glassmorphic Backdrop Container Slot matching layout geometry -->
  <rect x="24" y="24" width="464" height="464" rx="128" fill="#0b0f19" fill-opacity="0.75" stroke="#6366f1" stroke-width="6" stroke-opacity="0.25"/>

  <!-- 2. Main Brand Mark: The Paper-Fold Flight Silhouette -->
  <g filter="url(#ambientBr BrandingGlow)" transform="translate(12, 12)">
    
    <!-- Left Wing / Outer Document Fold Base Layer -->
    <path d="M120,340 L120,180 C120,150 145,130 175,138 L244,156 L244,354 L150,370 C132,373 120,358 120,340 Z" 
          fill="url(#brandLinearGradient)" 
          opacity="0.85" />

    <!-- Right Wing / Active Flight Extension Page Layer -->
    <path d="M368,340 L368,180 C368,150 343,130 313,138 L244,156 L244,354 L338,370 C356,373 368,358 368,340 Z" 
          fill="url(#brandLinearGradient)" />

    <!-- Center Spine Accent (Creates the 'N' Nest Geometry Connection Fold) -->
    <path d="M244,156 L150,370 L244,354 L338,370 Z" 
          fill="url(#innerShadowGradient)" />

    <!-- The Diamond Core Nest Egg (Natively denotes isolated secure sandbox runtimes) -->
    <path d="M244,210 L284,250 L244,290 L204,250 Z" 
          fill="#ffffff" 
          fill-opacity="0.95" 
          style="mix-blend-mode: overlay;" />
          
    <!-- Decorative Tech Horizon Flow Lines (Conveys lightning fast conversions speed) -->
    <path d="M170,410 L318,410" stroke="url(#brandLinearGradient)" stroke-width="12" stroke-linecap="round" opacity="0.3" />
    <path d="M210,436 L278,436" stroke="url(#brandLinearGradient)" stroke-width="8" stroke-linecap="round" opacity="0.15" />
  </g>
</svg>
